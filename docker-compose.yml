services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: project_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-projectmgr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secretpassword}
      POSTGRES_DB: ${DB_NAME:-projectmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projectmgr} -d ${DB_NAME:-projectmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Rate Limiting & Caching
  redis:
    image: redis:7-alpine
    container_name: project_manager_redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_manager_web
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${DB_USER:-projectmgr}:${DB_PASSWORD:-secretpassword}@db:5432/${DB_NAME:-projectmanager}
      - REDIS_URL=redis://redis:6379/0
      
      # Email Configuration
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@example.com}
      
      # Slack Integration
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_ENABLED=${SLACK_ENABLED:-false}
      - SLACK_DEFAULT_CHANNEL=${SLACK_DEFAULT_CHANNEL:-#general}
      - SLACK_CHANNEL_BUGS=${SLACK_CHANNEL_BUGS:-#bugs}
      - SLACK_CHANNEL_FEATURES=${SLACK_CHANNEL_FEATURES:-#features}
      - SLACK_CHANNEL_TASKS=${SLACK_CHANNEL_TASKS:-#tasks}
      - SLACK_CHANNEL_STORIES=${SLACK_CHANNEL_STORIES:-#features}
      
      # GitHub OAuth
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_OAUTH_ENABLED=${GITHUB_OAUTH_ENABLED:-false}
      
      # AWS Bedrock AI
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
      
      # App Settings
      - APP_NAME=${APP_NAME:-Project Manager}
      - APP_URL=${APP_URL:-http://localhost:5000}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5987:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: project_manager_nginx
    restart: unless-stopped
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    profiles:
      - production

  # # Cloudflare Tunnel (Optional - for secure tunnel access)
  # cloudflare-tunnel:
  #   image: cloudflare/cloudflared:2024.6.0
  #   container_name: project_manager_cloudflared
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   restart: unless-stopped
  #   environment:
  #     CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - web
  #   profiles:
  #     - tunnel

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: project_manager_network
