{% extends "base.html" %}

{% block title %}500 Server Error - {{ app_name }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-muted">500</h1>
    <h2 class="mb-4">Something Went Wrong</h2>
    <p class="text-muted mb-4">We're experiencing technical difficulties. Please try again later.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> Go Home
        </a>
        <button onclick="location.reload()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> Retry
        </button>
    </div>
</div>
{% endblock %}
