{% extends "base.html" %}

{% block title %}403 Forbidden - {{ app_name }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-muted">403</h1>
    <h2 class="mb-4">Access Denied</h2>
    <p class="text-muted mb-4">You don't have permission to access this resource.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> Go Home
        </a>
        <button onclick="history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Go Back
        </button>
    </div>
</div>
{% endblock %}
