{% extends "base.html" %}

{% block title %}Reset Password - {{ app_name }}{% endblock %}

{% block guest_content %}
<div class="auth-container auth-simple">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" class="auth-logo">
            <h1>Create New Password</h1>
            <p>Please enter a new password for your account.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="New password" required minlength="8">
                <label for="password">New password</label>
                <small class="form-text text-muted">At least 8 characters</small>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                       placeholder="Confirm password" required>
                <label for="confirm_password">Confirm new password</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100">
                Reset Password
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
