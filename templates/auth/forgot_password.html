{% extends "base.html" %}

{% block title %}Forgot Password - {{ app_name }}{% endblock %}

{% block guest_content %}
<div class="auth-container auth-simple">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" class="auth-logo">
            <h1>Reset Password</h1>
            <p>Enter your email and we'll send you a link to reset your password.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="name@example.com" required autofocus>
                <label for="email">Email address</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100">
                Send Reset Link
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
